<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript - Hello</title>

</head>

<body>
    <h1 id="hello">Hello World!</h1>
    <button onclick="hello()">Hello</button>


    <script>
        let hellos = document.querySelector("#hello");

        function hello() {
            if (hellos.innerHTML === "Hello World!") {
                hellos.innerHTML = "Adeus!";
            } else {
                hellos.innerHTML = "Hello World!";
            }
        };
    </script>
</body>

</html>
