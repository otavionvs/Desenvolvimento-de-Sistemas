<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="listas.html">
        <label>Nome:</label>
        <input name="nome" type="text" placeholder="Escreva o seu nome">
        <label>Senha:</label>
        <input name="senha" type="password" placeholder="Escreva sua senha">
        <label>Idade:</label>
        <input name="idade" type="number" placeholder="Escreva sua idade" min="0" max="120">
        <label>Email:</label>
        <input name="email" type="email" placeholder="Escreva seu email">
        <input name="submit" type="submit">
    </form>
</body>
</html>
